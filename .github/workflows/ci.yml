name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: planningpoker-web/package-lock.json

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install frontend dependencies
        run: cd planningpoker-web && npm ci

      - name: Frontend lint + format check
        run: cd planningpoker-web && npm run lint && npm run format:check

      - name: Frontend vulnerability audit
        run: cd planningpoker-web && npm audit --audit-level=high

      - name: Backend format check
        run: ./gradlew spotlessCheck --no-daemon

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: planningpoker-web/package-lock.json

      - name: Install frontend dependencies
        run: cd planningpoker-web && npm ci

      - name: Build frontend
        run: cd planningpoker-web && npm run build

      - name: Upload Vite output
        uses: actions/upload-artifact@v7
        with:
          name: web-build
          path: planningpoker-web/build/
          retention-days: 1
          if-no-files-found: error

  unit-tests:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: planningpoker-web/package-lock.json

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install frontend dependencies
        run: cd planningpoker-web && npm ci

      - name: Run frontend unit tests with coverage
        run: cd planningpoker-web && npm run test:coverage

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: planningpoker-web/coverage/
          retention-days: 7
          if-no-files-found: warn

      - name: Download Vite output
        uses: actions/download-artifact@v8
        with:
          name: web-build
          path: planningpoker-web/build/

      - name: Package web JAR
        run: ./gradlew planningpoker-web:jar --no-daemon

      - name: Run backend tests + coverage verification
        run: ./gradlew planningpoker-api:check --no-daemon

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: planningpoker-api/build/reports/jacoco/test/
          retention-days: 7
          if-no-files-found: warn

  e2e-shard:
    needs: build-web
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: planningpoker-web/package-lock.json

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install frontend dependencies
        run: cd planningpoker-web && npm ci

      - name: Download Vite output
        uses: actions/download-artifact@v8
        with:
          name: web-build
          path: planningpoker-web/build/

      - name: Package web JAR
        run: ./gradlew planningpoker-web:jar --no-daemon

      - name: Install Playwright browsers
        run: cd planningpoker-web && npx playwright install chromium --with-deps

      - name: Start backend
        run: ./gradlew planningpoker-api:bootRun --no-daemon &

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/actuator/health && exit 0
            sleep 2
          done
          echo "Backend failed to start" && exit 1

      - name: Run Playwright tests
        run: cd planningpoker-web && npx playwright test --shard=${{ matrix.shard }}/2

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: planningpoker-web/test-results/
          retention-days: 7

  e2e-tests:
    needs: e2e-shard
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate shard results
        run: |
          if [ "${{ needs.e2e-shard.result }}" != "success" ]; then
            echo "One or more e2e shards did not succeed: ${{ needs.e2e-shard.result }}" >&2
            exit 1
          fi

  native-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build native image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: planningpoker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test container healthcheck
        run: |
          docker run -d --name pp -p 9000:9000 -e PORT=9000 planningpoker:ci
          for i in $(seq 1 45); do
            if curl -sf http://localhost:9000/actuator/health; then
              echo "healthy"
              exit 0
            fi
            sleep 2
          done
          echo "container failed to become healthy" >&2
          docker logs pp
          exit 1

      - name: Smoke-test native binary endpoints
        run: |
          curl -fsS http://localhost:9000/version
          SESS=$(curl -fsS -X POST http://localhost:9000/createSession \
            -H 'Content-Type: application/json' \
            -d '{"userName":"alice","schemeType":"fibonacci","includeUnsure":true,"isSpectator":false}' \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["sessionId"])')
          test ${#SESS} -eq 12 || { echo "sessionId not 12 chars: $SESS" >&2; exit 1; }
          curl -fsS "http://localhost:9000/sessionUsers?sessionId=$SESS" | grep -q alice
          curl -fsS "http://localhost:9000/stomp/info" | grep -q '"websocket":true'

      - name: Cleanup container
        if: always()
        run: docker rm -f pp 2>/dev/null || true

  release:
    needs: [lint, unit-tests, e2e-tests, native-image]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    # Serialize across all master pushes so two rapid merges can't run
    # semantic-release in parallel (which would race on tag pushes and
    # next-version computation). cancel-in-progress: false queues the
    # newer run behind a running one — GitHub keeps at most one pending
    # + one running per group, so a third push supersedes the queued
    # one and that's fine: the latest run sees every commit since the
    # last tag and produces the right cumulative release.
    concurrency:
      group: release
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install semantic-release
        run: npm ci

      - name: Install frontend dependencies
        run: cd planningpoker-web && npm ci

      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
