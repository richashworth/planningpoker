name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: planningpoker-web/package-lock.json

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build frontend + web JAR
        run: |
          cd planningpoker-web && npm ci && npm run build && cd ..
          ./gradlew planningpoker-web:jar --no-daemon

      - name: Run frontend unit tests
        run: cd planningpoker-web && npm test

      - name: Run backend tests
        run: ./gradlew planningpoker-api:test --no-daemon

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: planningpoker-web/package-lock.json

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install frontend dependencies
        run: cd planningpoker-web && npm ci

      - name: Build frontend + web JAR
        run: |
          cd planningpoker-web && npm run build && cd ..
          ./gradlew planningpoker-web:jar --no-daemon

      - name: Install Playwright browsers
        run: cd planningpoker-web && npx playwright install chromium --with-deps

      - name: Start backend
        run: ./gradlew planningpoker-api:bootRun --no-daemon &

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/actuator/health && exit 0
            sleep 2
          done
          echo "Backend failed to start" && exit 1

      - name: Run Playwright tests
        run: cd planningpoker-web && npx playwright test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: planningpoker-web/test-results/
          retention-days: 7
