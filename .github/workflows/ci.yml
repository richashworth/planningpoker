name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: planningpoker-web/package-lock.json

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install frontend dependencies
        run: cd planningpoker-web && npm ci

      - name: Frontend lint + format check
        run: cd planningpoker-web && npm run lint && npm run format:check

      - name: Backend format check
        run: ./gradlew spotlessCheck --no-daemon

  build-web:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: planningpoker-web/package-lock.json

      - name: Install frontend dependencies
        run: cd planningpoker-web && npm ci

      - name: Build frontend
        run: cd planningpoker-web && npm run build

      - name: Upload Vite output
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: planningpoker-web/build/
          retention-days: 1
          if-no-files-found: error

  unit-tests:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: planningpoker-web/package-lock.json

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install frontend dependencies
        run: cd planningpoker-web && npm ci

      - name: Run frontend unit tests with coverage
        run: cd planningpoker-web && npm run test:coverage

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: planningpoker-web/coverage/
          retention-days: 7
          if-no-files-found: warn

      - name: Download Vite output
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: planningpoker-web/build/

      - name: Package web JAR
        run: ./gradlew planningpoker-web:jar --no-daemon

      - name: Run backend tests + coverage verification
        run: ./gradlew planningpoker-api:check --no-daemon

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: planningpoker-api/build/reports/jacoco/test/
          retention-days: 7
          if-no-files-found: warn

  e2e-tests:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: planningpoker-web/package-lock.json

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install frontend dependencies
        run: cd planningpoker-web && npm ci

      - name: Download Vite output
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: planningpoker-web/build/

      - name: Package web JAR
        run: ./gradlew planningpoker-web:jar --no-daemon

      - name: Install Playwright browsers
        run: cd planningpoker-web && npx playwright install chromium --with-deps

      - name: Start backend
        run: ./gradlew planningpoker-api:bootRun --no-daemon &

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/actuator/health && exit 0
            sleep 2
          done
          echo "Backend failed to start" && exit 1

      - name: Run Playwright tests
        run: cd planningpoker-web && npx playwright test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: planningpoker-web/test-results/
          retention-days: 7

  release:
    needs: [unit-tests, e2e-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install semantic-release
        run: npm ci

      - name: Install frontend dependencies
        run: cd planningpoker-web && npm ci

      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
