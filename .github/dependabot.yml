version: 2
updates:
  - package-ecosystem: npm
    directory: /planningpoker-web
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    # ESLint 10 needs eslint + @eslint/js + eslint-plugin-react bumped together,
    # which Dependabot cannot do atomically. eslint-plugin-react has no release
    # supporting ESLint 10 (jsx-eslint/eslint-plugin-react#4018 is fixed upstream
    # but unpublished). Remove both entries once it ships — see issue #229.
    ignore:
      - dependency-name: eslint
        update-types:
          - version-update:semver-major
      - dependency-name: "@eslint/js"
        update-types:
          - version-update:semver-major

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      all-actions:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      all-docker:
        patterns:
          - "*"
