SPECIFICATION Spec

INVARIANT TypeOK
INVARIANT NoDoubleVote
INVARIANT NoDuplicateUsername
INVARIANT AllEstimatesHaveMembers
INVARIANT ClearedSessionsAreEmpty

\* Small constants for tractable model checking.
\* 2 threads are needed to expose TOCTOU races (two concurrent requests).
\* 1 session keeps state space small. 2 users and 2 estimates are sufficient.
CONSTANT
    Sessions = {s1}
    Users = {u1, u2}
    Estimates = {e1, e2}
    Threads = {t1, t2}
