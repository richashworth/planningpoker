SPECIFICATION Spec

CONSTANT
    Clients = {c1, c2}

\* --- Safety invariants ---
\*
\* TypeOK: all variables stay within their declared domains.
INVARIANT TypeOK

\* NoFalseKick: a client reaches on_welcome only when the session is evicted
\* or the client is no longer a member.  Expected to HOLD.
INVARIANT NoFalseKick

\* ValidationGuardHolds: validations are only issued after wasConnected=TRUE.
\* Expected to HOLD.
INVARIANT ValidationGuardHolds

\* KickedWhileReconnectingGap: asserts that no client can be connected + in_game
\* while the session is active but the client is not a member.  Expected to be
\* VIOLATED — TLC will produce a trace showing the protocol gap:
\*   KickUser -> client reconnects -> ResolveValidationOk (200, gap) -> client
\*   stays in_game despite being removed from members.
INVARIANT KickedWhileReconnectingGap

\* NoStaleResultsAfterReset: asserts no client holds version 1 when the server
\* has reset to 0.  Expected to be VIOLATED — TLC will produce a trace showing
\* a pre-reset burst message arriving after the reset.
INVARIANT NoStaleResultsAfterReset

\* --- Liveness ---
\*
\* NOTE: SYMMETRY is intentionally omitted from this config because this spec
\* includes a PROPERTY line and symmetry reduction is unsound with liveness
\* checking (TLC may produce false-positive results).
\*
\* EventualReconnect: every disconnected client that has been connected before
\* eventually reconnects and clears its pending validations.
PROPERTY EventualReconnect
