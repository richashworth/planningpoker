defaultTasks 'planningpoker-web:clean',
        'planningpoker-web:yarn',
        'planningpoker-web:yarn_run_build',
        'planningpoker-web:webjar',
        'planningpoker-api:clean',
        'planningpoker-api:build'

wrapper {
    gradleVersion = '8.10'
    distributionType = Wrapper.DistributionType.ALL
}

allprojects {
    tasks.withType(JavaCompile).configureEach {
        options.release = 21
    }
}
