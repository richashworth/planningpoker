defaultTasks 'planningpoker-web:clean',
        'planningpoker-web:jar',
        'planningpoker-api:clean',
        'planningpoker-api:build'

wrapper {
    gradleVersion = '8.14'
    distributionType = Wrapper.DistributionType.ALL
}

allprojects {
    tasks.withType(JavaCompile).configureEach {
        options.release = 25
    }
}
