<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- Back card -->
  <g transform="rotate(12, 16, 16)">
    <rect x="7" y="3" width="18" height="24" rx="2.5" fill="none" stroke="white" stroke-width="0.7" stroke-opacity="0.2"/>
  </g>
  <!-- Front card -->
  <g transform="rotate(-5, 16, 16)">
    <rect x="7" y="4" width="18" height="24" rx="2.5" fill="none" stroke="white" stroke-width="0.8" stroke-opacity="0.5"/>
    <!-- Corner rank PP -->
    <text x="10" y="12.5" font-family="Inter, sans-serif" font-size="7" font-weight="700" fill="white" letter-spacing="-0.5">PP</text>
    <!-- Nautilus spiral — counter-clockwise, tapering -->
    <path d="M23,25 C23,20 21,16 17,15 C13,14 11,17 11,20 C11,23 13,24.5 15,24.5" stroke="white" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <path d="M15,24.5 C17,24.5 18.5,23 18.5,21 C18.5,19.5 17.5,18.5 16.5,18.5 C15.7,18.5 15,19 15,19.8 C15,20.3 15.3,20.7 15.8,20.7" stroke="white" stroke-width="0.6" fill="none" stroke-linecap="round"/>
  </g>
</svg>
